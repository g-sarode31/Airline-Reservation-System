<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Contact - SkyWings</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="css/style.css"></head><body data-page="contact"><nav class="navbar navbar-expand-lg fixed-top navbar-custom"><div class="container"><a class="navbar-brand brand" href="index.html">SkyWings</a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="nav"><ul class="navbar-nav ms-auto" id="navAuth"></ul></div></div></nav><div class="main-wrap"><section class="container py-4"><div class="row g-4"><div class="col-lg-6"><div class="form-card p-4"><h3>Contact Us</h3><p class="muted">Need help with booking or flight changes? Send us a message.</p><form id="contactForm"><div class="mb-3"><label class="form-label">Name</label><input class="form-control" required></div><div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" required></div><div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" rows="4" required></textarea></div><button class="btn btn-primary">Send Message</button></form></div></div><div class="col-lg-6"><div class="card-pro p-4"><h4 class="mb-3">FAQ</h4><div class="accordion" id="faq"><div class="accordion-item"><h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q1">How do I cancel a booking?<
